events {}

http {
  server {
    listen 8080;

    location /items/ {
      proxy_pass http://item-service:8081/items/;
    }

    location /orders/ {
      proxy_pass http://order-service:8082/orders/;
    }

    location /payments/ {
      proxy_pass http://payment-service:8083/payments/;
    }
  }
}